name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - 'data/daily_scans/*.json'
      - 'data/simulation/*.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (copy data into site)
        run: |
          mkdir -p docs/site/data/daily_scans docs/site/data/simulation
          cp data/daily_scans/*.json docs/site/data/daily_scans/ 2>/dev/null || true
          cp data/simulation/*.json docs/site/data/simulation/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (build_type=workflow) if it got reset, e.g. by a
          # repository visibility change.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
